<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Canvas Horror Escape</title>
<style>
body { background-color: #111; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Courier New', Courier, monospace; }
canvas { border: 2px solid #444; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
#ui { width: 600px; height: 100px; margin-top: 10px; background: #222; padding: 15px; border: 1px solid #444; font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
<h2 id="title">遺された地下室</h2>
<canvas id="gameCanvas" width="600" height="400"></canvas>
<div id="ui">画面内の怪しい場所をクリックして、この部屋から脱出してください。</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
let state = { hasKey: false, paperRead: false, isSafeOpen: false, safeCode: "413", currentInput: "", gameOver: false };
const objects = {
  door: { x: 450, y: 150, w: 80, h: 180, label: "ドア" },
  safe: { x: 100, y: 250, w: 60, h: 60, label: "金庫" },
  desk: { x: 250, y: 280, w: 120, h: 60, label: "机" },
  painting: { x: 270, y: 80, w: 80, h: 100, label: "絵画" }
};
function draw() {
  ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#332211"; ctx.fillRect(0, 320, canvas.width, 80);
  ctx.fillStyle = state.hasKey ? "#442211" : "#221100";
  ctx.fillRect(objects.door.x, objects.door.y, objects.door.w, objects.door.h);
  ctx.strokeStyle = "#000"; ctx.strokeRect(objects.door.x, objects.door.y, objects.door.w, objects.door.h);
  ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(470, 250, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = state.isSafeOpen ? "#555" : "#333";
  ctx.fillRect(objects.safe.x, objects.safe.y, objects.safe.w, objects.safe.h);
  ctx.strokeStyle = "#000"; ctx.strokeRect(objects.safe.x, objects.safe.y, objects.safe.w, objects.safe.h);
  if(!state.isSafeOpen) { ctx.fillStyle = "white"; ctx.fillText("CODE", 115, 275); }
  ctx.fillStyle = "#5c4033"; ctx.fillRect(objects.desk.x, objects.desk.y, objects.desk.w, objects.desk.h);
  ctx.fillStyle = "white"; ctx.fillRect(280, 285, 20, 10);
  ctx.fillStyle = "#000"; ctx.fillRect(objects.painting.x, objects.painting.y, objects.painting.w, objects.painting.h);
  ctx.strokeStyle = "#666"; ctx.lineWidth = 5;
  ctx.strokeRect(objects.painting.x, objects.painting.y, objects.painting.w, objects.painting.h);
  ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(300, 120, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(320, 120, 2, 0, Math.PI*2); ctx.fill();
  if (state.gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = "red"; ctx.font = "40px serif"; ctx.fillText("ESCAPE SUCCESS", 150, 200);
  }
}
canvas.addEventListener('click', (e) => {
  if (state.gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left; const y = e.clientY - rect.top;
  if (x > objects.door.x && x < objects.door.x + objects.door.w && y > objects.door.y && y < objects.door.y + objects.door.h) {
    if (state.hasKey) { ui.innerHTML = "鍵を使ってドアを開けた！外へ脱出成功だ！"; state.gameOver = true; }
    else { ui.innerHTML = "鍵がかかっている。びくともしない。"; }
  } else if (x > objects.desk.x && x < objects.desk.x + objects.desk.w && y > objects.desk.y && y < objects.desk.y + objects.desk.h) {
    ui.innerHTML = "汚れた机だ。メモが置いてある。『死(4)は一(1)番惨(3)い』…？"; state.paperRead = true;
  } else if (x > objects.safe.x && x < objects.safe.x + objects.safe.w && y > objects.safe.y && y < objects.safe.y + objects.safe.h) {
    if (state.isSafeOpen) { ui.innerHTML = "金庫は空だ。"; }
    else { let input = prompt("3桁の数字を入力してください:"); if (input === state.safeCode) { ui.innerHTML = "金庫が開いた！中から「古い鍵」を手に入れた。"; state.isSafeOpen = true; state.hasKey = true; } else { ui.innerHTML = "番号が違うようだ。"; } }
  } else if (x > objects.painting.x && x < objects.painting.x + objects.painting.w && y > objects.painting.y && y < objects.painting.y + objects.painting.h) {
    ui.innerHTML = "気味の悪い肖像画だ。目がこちらを追いかけてくる気がする…。";
  } else { ui.innerHTML = "そこには何もない。"; }
  draw();
});
draw();
</script>
</body>
</html>
